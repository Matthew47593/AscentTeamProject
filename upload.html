<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Documents</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        padding: 20px;
    }

    .upload-container {
        background: #ffffff;
        padding: 40px;
        width: 420px;
        border-radius: 15px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        text-align: center;
    }

    .upload-container h2 {
        margin-bottom: 25px;
        color: #1e3c72;
        font-weight: 600;
    }

    .input-group {
        margin-bottom: 20px;
        text-align: left;
    }

    .input-group label {
        font-size: 14px;
        color: #2a5298;
        margin-bottom: 5px;
        display: block;
    }

    .input-group input,
    .input-group select,
    .input-group textarea {
        width: 100%;
        padding: 10px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        outline: none;
        transition: 0.3s;
    }

    .input-group input:focus,
    .input-group select:focus,
    .input-group textarea:focus {
        border-color: #2a5298;
        box-shadow: 0 0 8px rgba(42, 82, 152, 0.2);
    }

    .file-input {
        border: 2px dashed #2a5298;
        padding: 20px;
        text-align: center;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.3s;
    }

    .file-input:hover {
        background-color: #f0f6ff;
    }

    .file-input input {
        border: none;
    }

    .upload-btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background-color: #2a5298;
        color: #fff;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 10px;
    }

    .upload-btn:hover {
        background-color: #1e3c72;
    }

    .extra-links {
        margin-top: 20px;
        font-size: 14px;
    }

    .extra-links a {
        color: #2a5298;
        text-decoration: none;
    }

    .extra-links a:hover {
        text-decoration: underline;
    }
</style>
</head>
<body>

<div class="upload-container">
    <h2>Upload Document</h2>

    <form enctype="multipart/form-data">
        
        <div class="input-group">
            <label for="title">Document Title</label>
            <input type="text" id="title" placeholder="Enter document title" required>
        </div>

        <div class="input-group">
            <label for="category">Category</label>
            <select id="category" required>
                <option value="">Select Category</option>
                <option>Assignment</option>
                <option>Report</option>
                <option>Resume</option>
                <option>Other</option>
            </select>
        </div>

        <div class="input-group">
            <label>Choose File</label>
            <div class="file-input">
                <input type="file" required>
            </div>
        </div>

        <div class="input-group">
            <label for="description">Description (Optional)</label>
            <textarea id="description" rows="3" placeholder="Add a short description..."></textarea>
        </div>

        <button type="submit" class="upload-btn">Upload</button>

        <div class="extra-links">
            <p><a href="login.html">Logout</a></p>
        </div>

    </form>
</div>

</body>
</html>
