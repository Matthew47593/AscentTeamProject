<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Documents</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
        min-height: 100vh;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        padding: 40px 20px;
    }

    .container {
        max-width: 1000px;
        margin: auto;
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
    }

    h2 {
        text-align: center;
        margin-bottom: 30px;
        color: #1e3c72;
    }

    .top-bar {
        display: flex;
        justify-content: space-between;
        margin-bottom: 20px;
    }

    .btn {
        padding: 10px 15px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-weight: 600;
        text-decoration: none;
        font-size: 14px;
    }

    .upload-btn {
        background-color: #2a5298;
        color: white;
    }

    .upload-btn:hover {
        background-color: #1e3c72;
    }

    .logout-btn {
        background-color: #e0e0e0;
        color: #333;
    }

    .logout-btn:hover {
        background-color: #cfcfcf;
    }

    .documents-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 20px;
    }

    .document-card {
        background: #f7f9fc;
        padding: 20px;
        border-radius: 12px;
        border-left: 5px solid #2a5298;
        transition: 0.3s;
    }

    .document-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
    }

    .document-title {
        font-weight: 600;
        color: #1e3c72;
        margin-bottom: 8px;
    }

    .document-category {
        font-size: 13px;
        color: #2a5298;
        margin-bottom: 8px;
    }

    .document-description {
        font-size: 13px;
        color: #555;
    }

    .empty-state {
        text-align: center;
        color: #777;
        margin-top: 40px;
    }
</style>
</head>

<body>

<div class="container">
    <h2>All Uploaded Documents</h2>

    <div class="top-bar">
        <a href="upload.html" class="btn upload-btn">+ Upload New</a>
        <a href="login.html" class="btn logout-btn">Logout</a>
    </div>

    <div class="documents-grid" id="documentsGrid">
        <!-- Documents will appear here -->
    </div>

    <div class="empty-state" id="emptyState">
        No documents uploaded yet.
    </div>
</div>

<script>
    // Example sample documents (replace with backend later)
    const documents = [
        {
            title: "Math Assignment",
            category: "Assignment",
            description: "Chapter 5 algebra solutions."
        },
        {
            title: "Job Resume",
            category: "Resume",
            description: "Updated resume for 2026 applications."
        },
        {
            title: "Science Report",
            category: "Report",
            description: "Lab experiment results."
        }
    ];

    const grid = document.getElementById("documentsGrid");
    const emptyState = document.getElementById("emptyState");

    function renderDocuments() {
        if (documents.length === 0) {
            emptyState.style.display = "block";
            return;
        }

        emptyState.style.display = "none";

        documents.forEach(doc => {
            const card = document.createElement("div");
            card.classList.add("document-card");

            card.innerHTML = `
                <div class="document-title">${doc.title}</div>
                <div class="document-category">${doc.category}</div>
                <div class="document-description">${doc.description}</div>
            `;

            grid.appendChild(card);
        });
    }

    renderDocuments();
</script>

</body>
</html>
